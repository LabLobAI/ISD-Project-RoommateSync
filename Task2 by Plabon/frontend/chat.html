<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Chat Prototype</title>
  <style>
    body { font-family: Arial, sans-serif; }
    .layout { display:flex; max-width:900px; margin:16px auto; gap:12px; }
    .sidebar { width:200px; border:1px solid #ddd; padding:8px; }
    .main { flex:1; border:1px solid #ddd; display:flex; flex-direction:column; }
    .messages { flex:1; padding:12px; overflow:auto; height:400px; background:#fafafa; }
    .msg { margin-bottom:8px; }
    .from-me { text-align:right; color:#005; }
    .composer { padding:8px; border-top:1px solid #eee; display:flex; gap:8px; }
    textarea { flex:1; height:60px; }
  </style>
</head>
<body>
  <div style="max-width:900px;margin:8px auto;">
    <h3>Connection-Locked Chat Prototype</h3>
    <div>
      <label>Your ID: <input id="user_a" type="number" value="1"></label>
      <label>Partner ID: <input id="user_b" type="number" value="2"></label>
      <button id="start">Open Chat</button>
    </div>
  </div>

  <div class="layout" id="chat-ui" style="display:none;">
    <div class="sidebar">
      <strong>Matched Users</strong>
      <ul id="users-list"><li id="u-2">User 2</li></ul>
    </div>
    <div class="main">
      <div class="messages" id="messages"></div>
      <div class="composer">
        <textarea id="message_text" maxlength="1000"></textarea>
        <button id="send">Send</button>
      </div>
    </div>
  </div>

  <script>
    let pollInterval = null;
    let lastId = 0;

    function appendMessage(m, me) {
      const div = document.createElement('div');
      div.className = 'msg ' + (me ? 'from-me' : 'from-them');
      div.innerHTML = `<div><small>${m.sent_at}</small></div><div>${m.message_text}</div>`;
      document.getElementById('messages').appendChild(div);
    }

    async function fetchLoop() {
      const a = Number(document.getElementById('user_a').value);
      const b = Number(document.getElementById('user_b').value);
      try {
        const url = `../api/fetch_messages.php?user_a=${a}&user_b=${b}&since_id=${lastId}`;
        const res = await fetch(url);
        if (res.status === 403) {
          alert('Chat Locked: connection not accepted');
          clearInterval(pollInterval);
          return;
        }
        const data = await res.json();
        if (data.messages && data.messages.length) {
          const container = document.getElementById('messages');
          for (const m of data.messages) {
            appendMessage(m, m.sender_id === a);
            lastId = Math.max(lastId, Number(m.message_id));
          }
          container.scrollTop = container.scrollHeight;
        }
      } catch (e) {
        console.error('fetchLoop error', e);
      }
    }

    document.getElementById('start').addEventListener('click', () => {
      document.getElementById('chat-ui').style.display = 'flex';
      lastId = 0;
      // initial fetch
      fetchLoop();
      pollInterval = setInterval(fetchLoop, 3000);
    });

    document.getElementById('send').addEventListener('click', async () => {
      const a = Number(document.getElementById('user_a').value);
      const b = Number(document.getElementById('user_b').value);
      const text = document.getElementById('message_text').value;
      if (!text.trim()) return;
      try {
        const res = await fetch('../api/send_message.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sender_id: a, receiver_id: b, message_text: text })
        });
        if (res.status === 403) {
          alert('Chat Locked: cannot send message');
          return;
        }
        const d = await res.json();
        if (d.success) {
          document.getElementById('message_text').value = '';
          // fetch new messages immediately
          fetchLoop();
        } else {
          console.warn('send error', d);
        }
      } catch (e) { console.error(e); }
    });
  </script>
</body>
</html>
