<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Submit Review Prototype</title>
  <style>
    .stars { display:flex; gap:4px; }
    .star { cursor:pointer; font-size:24px; }
    textarea { width:100%; height:120px; }
    .card { max-width:520px; margin:20px auto; padding:16px; border:1px solid #ddd; border-radius:8px; }
  </style>
</head>
<body>
  <div class="card">
    <h3>Submit Peer Review</h3>
    <label>Reviewer ID: <input id="reviewer_id" type="number" value="1"></label><br>
    <label>Reviewee ID: <input id="reviewee_id" type="number" value="2"></label>

    <div>
      <label>Cleanliness: <span id="clean_label">3</span></label>
      <input id="clean" type="range" min="1" max="5" value="3">
    </div>
    <div>
      <label>Communication: <span id="comm_label">4</span></label>
      <input id="comm" type="range" min="1" max="5" value="4">
    </div>

    <div>
      <label>Feedback:</label>
      <textarea id="feedback" maxlength="1000" placeholder="Optional written feedback"></textarea>
    </div>

    <button id="submit">Send Review</button>
    <pre id="out"></pre>
  </div>

  <script>
    const clean = document.getElementById('clean');
    const comm = document.getElementById('comm');
    const cleanLabel = document.getElementById('clean_label');
    const commLabel = document.getElementById('comm_label');
    const out = document.getElementById('out');

    clean.addEventListener('input', () => cleanLabel.textContent = clean.value);
    comm.addEventListener('input', () => commLabel.textContent = comm.value);

    document.getElementById('submit').addEventListener('click', async () => {
      const payload = {
        reviewer_id: Number(document.getElementById('reviewer_id').value),
        reviewee_id: Number(document.getElementById('reviewee_id').value),
        cleanliness_score: Number(clean.value),
        communication_score: Number(comm.value),
        written_feedback: document.getElementById('feedback').value
      };

      out.textContent = 'Sending...';
      try {
        const res = await fetch('../api/submit_review.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        out.textContent = JSON.stringify({ status: res.status, body: data }, null, 2);
      } catch (e) {
        out.textContent = 'Error: ' + e.message;
      }
    });
  </script>
</body>
</html>
